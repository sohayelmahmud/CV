name: Build and Publish CV PDFs

on:
  push:
    paths:
      - '**.tex'
      - '.github/workflows/build-cv.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-extra texlive-fonts-recommended texlive-latex-recommended texlive-science texlive-fonts-extra ghostscript

      - name: Compile CV PDF
        run: |
          set -e
          pdflatex -interaction=nonstopmode CV-short.tex
          pdflatex -interaction=nonstopmode CV-short.tex # রেফারেন্স ঠিক করার জন্য ২য় বার রান

          mkdir -p docs
          mv CV-short.pdf docs/CV-short.pdf

      - name: Optimize PDF (compress)
        run: |
          if [ -f docs/CV-short.pdf ]; then
            gs -sDEVICE=pdfwrite -dCompatibilityLevel=1.5 -dPDFSETTINGS=/printer \
               -dNOPAUSE -dQUIET -dBATCH \
               -sOutputFile="docs/CV-short-min.pdf" docs/CV-short.pdf || true
            if [ -f docs/CV-short-min.pdf ]; then mv docs/CV-short-min.pdf docs/CV-short.pdf; fi
          fi

      - name: Commit updated PDF to docs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated build: update CV-short PDF" && git push)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdf
          path: docs/CV-short.pdf